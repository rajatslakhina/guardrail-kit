<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 900" width="700" height="900" font-family="Menlo, Monaco, monospace">
  <rect width="700" height="900" fill="#1e1e2e"/>
  <text x="30" y="45" font-size="22" fill="#f5f5f5" font-weight="bold">GuardrailKit Architecture</text>

  <rect x="180" y="70" width="340" height="50" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="350" y="101" font-size="14" fill="#cdd6f4" text-anchor="middle">user prompt (preRequest) / LLM reply (postResponse)</text>

  <line x1="350" y1="120" x2="350" y2="158" stroke="#89b4fa" stroke-width="2"/>
  <polygon points="350,166 344,154 356,154" fill="#89b4fa"/>

  <rect x="150" y="168" width="400" height="66" rx="8" fill="#45475a" stroke="#f9e2af" stroke-width="3"/>
  <text x="350" y="194" font-size="16" fill="#f9e2af" text-anchor="middle" font-weight="bold">GuardrailPipeline (actor)</text>
  <text x="350" y="216" font-size="11" fill="#bac2de" text-anchor="middle">screenRequest(_:) / screenResponse(_:)</text>

  <rect x="10" y="250" width="220" height="80" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="120" y="273" font-size="12" fill="#a6e3a1" text-anchor="middle" font-weight="bold">PIIDetector[]</text>
  <text x="120" y="291" font-size="10" fill="#9399b2" text-anchor="middle">Email / Phone / CreditCard</text>
  <text x="120" y="306" font-size="10" fill="#9399b2" text-anchor="middle">SocialSecurityNumber</text>
  <text x="120" y="321" font-size="10" fill="#9399b2" text-anchor="middle">regex-based, pluggable</text>

  <rect x="470" y="250" width="220" height="80" rx="6" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="580" y="273" font-size="12" fill="#cba6f7" text-anchor="middle" font-weight="bold">ContentPolicyRule[]</text>
  <text x="580" y="291" font-size="10" fill="#9399b2" text-anchor="middle">BannedPhraseRule</text>
  <text x="580" y="306" font-size="10" fill="#9399b2" text-anchor="middle">(swap in a real moderation</text>
  <text x="580" y="321" font-size="10" fill="#9399b2" text-anchor="middle">API by conforming)</text>

  <line x1="230" y1="290" x2="260" y2="270" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="470" y1="290" x2="440" y2="270" stroke="#cba6f7" stroke-width="1.5"/>

  <rect x="220" y="350" width="260" height="56" rx="8" fill="#1e2b23" stroke="#585b70" stroke-width="1.5"/>
  <text x="350" y="374" font-size="12" fill="#cdd6f4" text-anchor="middle">merge findings &#8212; redact non-overlapping</text>
  <text x="350" y="392" font-size="12" fill="#cdd6f4" text-anchor="middle">PII matches, decide verdict</text>
  <line x1="350" y1="330" x2="350" y2="348" stroke="#89b4fa" stroke-width="2"/>

  <line x1="280" y1="406" x2="140" y2="450" stroke="#a6e3a1" stroke-width="2"/>
  <line x1="350" y1="406" x2="350" y2="450" stroke="#f9e2af" stroke-width="2"/>
  <line x1="420" y1="406" x2="560" y2="450" stroke="#f38ba8" stroke-width="2"/>

  <rect x="20" y="450" width="240" height="80" rx="8" fill="#1e2b23" stroke="#a6e3a1" stroke-width="2"/>
  <text x="140" y="474" font-size="13" fill="#a6e3a1" text-anchor="middle" font-weight="bold">ALLOW</text>
  <text x="140" y="494" font-size="10" fill="#cdd6f4" text-anchor="middle">no findings</text>
  <text x="140" y="510" font-size="10" fill="#cdd6f4" text-anchor="middle">textToForward == original</text>

  <rect x="230" y="450" width="240" height="80" rx="8" fill="#2b2617" stroke="#f9e2af" stroke-width="2"/>
  <text x="350" y="474" font-size="13" fill="#f9e2af" text-anchor="middle" font-weight="bold">REDACTED</text>
  <text x="350" y="494" font-size="10" fill="#cdd6f4" text-anchor="middle">PII replaced with</text>
  <text x="350" y="510" font-size="10" fill="#cdd6f4" text-anchor="middle">[REDACTED:CATEGORY]</text>

  <rect x="440" y="450" width="240" height="80" rx="8" fill="#2b1e22" stroke="#f38ba8" stroke-width="2"/>
  <text x="560" y="474" font-size="13" fill="#f38ba8" text-anchor="middle" font-weight="bold">BLOCKED(reason:)</text>
  <text x="560" y="494" font-size="10" fill="#cdd6f4" text-anchor="middle">any .block finding</text>
  <text x="560" y="510" font-size="10" fill="#cdd6f4" text-anchor="middle">textToForward == nil</text>

  <line x1="140" y1="530" x2="350" y2="580" stroke="#a6e3a1" stroke-width="2"/>
  <line x1="350" y1="530" x2="350" y2="580" stroke="#f9e2af" stroke-width="2"/>
  <line x1="560" y1="530" x2="350" y2="580" stroke="#f38ba8" stroke-width="2"/>

  <rect x="200" y="580" width="300" height="50" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="350" y="611" font-size="15" fill="#89dceb" text-anchor="middle" font-weight="bold">GuardrailOutcome</text>

  <line x1="350" y1="630" x2="350" y2="668" stroke="#89b4fa" stroke-width="2"/>
  <polygon points="350,676 344,664 356,664" fill="#89b4fa"/>

  <rect x="180" y="678" width="340" height="60" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
  <text x="350" y="703" font-size="15" fill="#cba6f7" text-anchor="middle" font-weight="bold">ProviderGatewayKit</text>
  <text x="350" y="723" font-size="11" fill="#bac2de" text-anchor="middle">sanitized prompt routed to a provider</text>

  <rect x="60" y="760" width="580" height="110" rx="8" fill="#181825" stroke="#585b70" stroke-width="1.5"/>
  <text x="90" y="788" font-size="14" fill="#f9e2af" font-weight="bold">GuardrailEventRecorder (optional)</text>
  <text x="90" y="812" font-size="12" fill="#cdd6f4" font-family="Menlo, monospace">one GuardrailEvent per screening &#8212; phase, verdict,</text>
  <text x="90" y="832" font-size="12" fill="#cdd6f4" font-family="Menlo, monospace">findingCount, timestamp (via injectable GuardrailClock)</text>
  <text x="90" y="854" font-size="11" fill="#9399b2">InMemoryGuardrailEventRecorder ships built in; swap in a real tracer</text>
</svg>
